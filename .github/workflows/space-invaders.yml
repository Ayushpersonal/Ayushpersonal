name: Generate Space Invaders Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # har 12 ghante mein auto update
  workflow_dispatch:           # manual trigger bhi
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Space Invaders SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: Ayushpersonal
        run: node .github/scripts/generate-space-invaders.js

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
           GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
